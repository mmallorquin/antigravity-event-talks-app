<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noticias de IA y sus Aplicaciones</title>
  <meta name="description" content="Mantente al día con las últimas noticias y aplicaciones de Inteligencia Artificial (IA): explora, filtra y tuitea sobre las novedades." />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='80'>🧠</text></svg>" />
</head>
<body>

  <div class="app-wrapper">

    <!-- Header -->
    <header class="header">
      <div class="header__logo-row">
        <div class="header__icon">
          <!-- Abstract Neural Brain icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.44 2.5 2.5 0 0 1 0-4.12 2.5 2.5 0 0 1 0-4.88A2.5 2.5 0 0 1 9.5 2z" />
            <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.44 2.5 2.5 0 0 0 0-4.12 2.5 2.5 0 0 0 0-4.88A2.5 2.5 0 0 0 14.5 2z" />
          </svg>
        </div>
        <h1 class="header__title">Noticias de IA y sus Aplicaciones</h1>
        <!-- Theme Toggle -->
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Cambiar tema claro/oscuro">
          <span class="theme-toggle__icon theme-toggle__icon--sun">☀️</span>
          <span class="theme-toggle__icon theme-toggle__icon--moon">🌙</span>
        </button>
      </div>
      <p class="header__sub">Explora las últimas novedades sobre Inteligencia Artificial y sus aplicaciones — y tuitea sobre ellas.</p>
    </header>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar__meta">
        <strong id="meta-count">—</strong> noticias · Última actualización <span id="meta-updated">—</span>
      </div>
      <div class="toolbar__actions">
        <button id="btn-export" class="btn-export" type="button" disabled>
          <svg class="btn-export__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Exportar CSV
        </button>
        <button id="btn-refresh" class="btn-refresh" type="button">
          <svg class="btn-refresh__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10" />
            <polyline points="1 20 1 14 7 14" />
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
          </svg>
          Actualizar
        </button>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="search-container">
      <input type="text" id="search-input" class="search-input" placeholder="Buscar noticias de IA por palabra clave o título..." autocomplete="off" />
      <span class="search-icon">🔍</span>
    </div>

    <!-- Filter chips -->
    <div id="filter-bar" class="filter-bar"></div>

    <!-- Cards -->
    <div id="card-list" class="card-list"></div>

  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
