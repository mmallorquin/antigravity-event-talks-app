<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BigQuery Release Notes</title>
  <meta name="description" content="Stay up to date with Google BigQuery release notes — browse, filter, and tweet about the latest updates." />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='80'>📋</text></svg>" />
</head>
<body>

  <div class="app-wrapper">

    <!-- Header -->
    <header class="header">
      <div class="header__logo-row">
        <div class="header__icon">
          <!-- BigQuery-style icon -->
          <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm2.5-5c0 1.38-1.12 2.5-2.5 2.5S9.5 13.38 9.5 12s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5z"/></svg>
        </div>
        <h1 class="header__title">BigQuery Release Notes</h1>
      </div>
      <p class="header__sub">Browse the latest Google BigQuery updates — and tweet about them.</p>
    </header>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar__meta">
        <strong id="meta-count">—</strong> entries · Last refreshed <span id="meta-updated">—</span>
      </div>
      <button id="btn-refresh" class="btn-refresh" type="button">
        <svg class="btn-refresh__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10" />
          <polyline points="1 20 1 14 7 14" />
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
        </svg>
        Refresh
      </button>
    </div>

    <!-- Filter chips -->
    <div id="filter-bar" class="filter-bar"></div>

    <!-- Cards -->
    <div id="card-list" class="card-list"></div>

  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
